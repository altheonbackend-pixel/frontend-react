<?xml version="1.0" encoding="UTF-8"?>
<!--
  Altheon Connect — Brand Logo
  viewBox: 0 0 280 60
  Colours: Navy #1a2332 · Cyan #22d3ee · SubText #64748b
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 280 60"
  width="560"
  height="120"
  role="img"
  aria-label="Altheon Connect logo"
>
  <title>Altheon Connect</title>

  <defs>
    <!-- Glow filter for the ECG crossbar -->
    <filter id="ecg-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Icon mark ───────────────────────────────────────── -->
  <!-- Icon: 40×40 viewBox scaled 1.1× → 44px, offset (8,8) -->
  <g transform="translate(8 8) scale(1.1)">

    <!-- A-frame: left leg -->
    <line
      x1="20" y1="3.5" x2="3.5" y2="37"
      stroke="#1a2332" stroke-width="2.8"
      stroke-linecap="round"
    />
    <!-- A-frame: right leg -->
    <line
      x1="20" y1="3.5" x2="36.5" y2="37"
      stroke="#1a2332" stroke-width="2.8"
      stroke-linecap="round"
    />

    <!-- ECG glow layer -->
    <polyline
      filter="url(#ecg-glow)"
      points="10.5,22 12,22 13,20.5 14,22 15.5,22 16.5,25.5 17.5,9.5 18.5,27.5 19.5,22 21,22 22.5,20.5 23.5,19.5 25,22 29.5,22"
      fill="none"
      stroke="#22d3ee"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.45"
    />
    <!-- ECG trace — crisp top layer -->
    <polyline
      points="10.5,22 12,22 13,20.5 14,22 15.5,22 16.5,25.5 17.5,9.5 18.5,27.5 19.5,22 21,22 22.5,20.5 23.5,19.5 25,22 29.5,22"
      fill="none"
      stroke="#22d3ee"
      stroke-width="1.6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

  </g>

  <!-- ── Wordmark ─────────────────────────────────────────── -->
  <text
    x="62" y="31"
    font-family="'Liberation Sans', 'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="18.5"
    font-weight="800"
    fill="#1a2332"
    letter-spacing="2.1"
  >ALTHEON</text>

  <text
    x="63" y="45.5"
    font-family="'Liberation Sans', 'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="9"
    font-weight="400"
    fill="#64748b"
    letter-spacing="3.4"
  >CONNECT</text>

</svg>