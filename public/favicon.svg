<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Altheon Connect">
  <title>Altheon Connect</title>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="ecg-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.1" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded brand tile -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#tile)"/>

  <!-- A-frame icon — centered inside 40-unit region, offset by (12,12) -->
  <g transform="translate(12 12)">
    <!-- A-frame legs (white on gradient tile) -->
    <line x1="20" y1="3.5" x2="3.5" y2="37" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="20" y1="3.5" x2="36.5" y2="37" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>

    <!-- ECG glow + crisp trace (cyan) -->
    <polyline filter="url(#ecg-glow)"
      points="10.5,22 12,22 13,20.5 14,22 15.5,22 16.5,25.5 17.5,9.5 18.5,27.5 19.5,22 21,22 22.5,20.5 23.5,19.5 25,22 29.5,22"
      fill="none" stroke="#22d3ee" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
    <polyline
      points="10.5,22 12,22 13,20.5 14,22 15.5,22 16.5,25.5 17.5,9.5 18.5,27.5 19.5,22 21,22 22.5,20.5 23.5,19.5 25,22 29.5,22"
      fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
